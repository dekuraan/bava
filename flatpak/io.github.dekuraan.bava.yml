#
# Flatpak manifest for bava. Build locally with:
#
#   python3 flatpak/gen-cargo-sources.py          # refresh vendored crates
#   flatpak install -y flathub \
#       org.freedesktop.Platform//24.08 \
#       org.freedesktop.Sdk//24.08 \
#       org.freedesktop.Sdk.Extension.rust-stable//24.08
#   flatpak-builder --user --install --force-clean \
#       build-dir flatpak/io.github.dekuraan.bava.yml
#   flatpak run io.github.dekuraan.bava
#
app-id: io.github.dekuraan.bava
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: bava

finish-args:
  # Display: Wayland preferred, X11 fallback (winit picks at runtime).
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # GPU for the Vulkan/wgpu renderer.
  - --device=dri
  # Raw PulseAudio/PipeWire socket — needed to capture the sink *monitor*
  # source, which the portal-mediated audio path does not expose.
  - --socket=pulseaudio
  # Album-art fetching over HTTP (ureq).
  - --share=network
  # Read now-playing metadata from any MPRIS player on the session bus.
  - --talk-name=org.mpris.MediaPlayer2.*

modules:
  # FFTW (double precision) — cavacore links libfftw3 + libm. Not present in
  # the Freedesktop runtime, so build it here. Only the double-precision
  # library is needed; skip the single/long-double variants and the docs.
  - name: fftw3
    buildsystem: autotools
    config-opts:
      - --enable-shared
      - --disable-static
      - --disable-fortran
      - --disable-doc
    sources:
      - type: archive
        url: https://www.fftw.org/fftw-3.3.10.tar.gz
        sha256: 56c932549852cddcfafdab3820b0200c7742675be92179e59e6215b340e26467
    cleanup:
      - /bin
      - /include
      - /lib/pkgconfig
      - /lib/cmake
      - /share

  - name: bava
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/bava/cargo
        # cavacore-sys' build.rs compiles vendored cavacore.c, which does
        # `#include <fftw3.h>` from the *system* path — but the fftw3 module
        # installs the header under /app/include, which is not on the C
        # compiler's default search path. cc/gcc honour CPATH; LIBRARY_PATH
        # mirrors it for the link step. (pkg-config supplies these natively,
        # but build.rs only consults it for --libs, not --cflags.)
        CPATH: /app/include
        LIBRARY_PATH: /app/lib
    build-commands:
      - cargo build --offline --release -p bava
      - install -Dm755 target/release/bava /app/bin/bava
      - install -Dm644 flatpak/io.github.dekuraan.bava.desktop
        /app/share/applications/io.github.dekuraan.bava.desktop
      - install -Dm644 flatpak/io.github.dekuraan.bava.metainfo.xml
        /app/share/metainfo/io.github.dekuraan.bava.metainfo.xml
      - install -Dm644 flatpak/io.github.dekuraan.bava.svg
        /app/share/icons/hicolor/scalable/apps/io.github.dekuraan.bava.svg
    sources:
      - type: dir
        path: ..
        skip:
          - target
          - .git
          - build-dir
          - .flatpak-builder
      # Vendored crates + cargo config, generated by gen-cargo-sources.py.
      - cargo-sources.json
