name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Linux x86_64 ─────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpulse-dev \
            libpipewire-0.3-dev \
            clang \
            libclang-dev \
            libasound2-dev \
            libfftw3-dev \
            libdbus-1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libvulkan-dev

      # Primary build: default features include the native PipeWire backend
      # (needs libpipewire-0.3-dev + libclang for libspa-sys' bindgen). This
      # binary links libpipewire-0.3.so, so it requires PipeWire at runtime.
      - name: Build release (native PipeWire)
        run: cargo build --release -p bava

      - name: Strip + stage PipeWire binary
        run: strip target/release/bava

      - name: Upload PipeWire artifact
        uses: actions/upload-artifact@v4
        with:
          name: bava-linux-x86_64
          path: target/release/bava

      # Portable build: no libpipewire link, so it runs on pure-PulseAudio hosts
      # (and on PipeWire via pipewire-pulse). Uploaded as a separate artifact.
      - name: Build release (PulseAudio-only)
        run: cargo build --release -p bava --no-default-features

      - name: Strip + stage PulseAudio binary
        run: strip target/release/bava

      - name: Upload PulseAudio artifact
        uses: actions/upload-artifact@v4
        with:
          name: bava-linux-x86_64-pulseaudio
          path: target/release/bava

  # ── Windows x86_64 ────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install fftw3 (Windows)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://fftw.org/pub/fftw/fftw-3.3.5-dll64.zip" -OutFile fftw.zip
          Expand-Archive fftw.zip -DestinationPath fftw
          # The zip ships libfftw3-3.lib; cargo links 'fftw3' → MSVC looks for fftw3.lib.
          $lib = Get-ChildItem fftw -Recurse -Filter "libfftw3-3.lib" | Select-Object -First 1
          Copy-Item $lib.FullName (Join-Path $lib.DirectoryName "fftw3.lib")
          $fftwDir = $lib.DirectoryName
          echo "LIB=$fftwDir;$env:LIB" >> $env:GITHUB_ENV
          echo "INCLUDE=$fftwDir;$env:INCLUDE" >> $env:GITHUB_ENV

      - name: Build release
        run: cargo build --release -p bava

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bava-windows-x86_64
          path: target\release\bava.exe

  # ── macOS aarch64 (Apple Silicon) ─────────────────────────────────────────
  build-macos-arm:
    name: Build (macOS aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install fftw3
        run: brew install fftw

      - name: Build release
        run: cargo build --release -p bava --target aarch64-apple-darwin

      - name: Strip binary
        run: strip target/aarch64-apple-darwin/release/bava

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bava-macos-aarch64
          path: target/aarch64-apple-darwin/release/bava

  # ── macOS x86_64 (Intel) ──────────────────────────────────────────────────
  build-macos-x86:
    name: Build (macOS x86_64)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install fftw3
        run: brew install fftw

      - name: Build release
        run: cargo build --release -p bava

      - name: Strip binary
        run: strip target/release/bava

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bava-macos-x86_64
          path: target/release/bava

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs:
      - build-linux
      - build-windows
      - build-macos-arm
      - build-macos-x86
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename artifacts for release
        run: |
          mv dist/bava-linux-x86_64/bava             dist/bava-linux-x86_64
          mv dist/bava-linux-x86_64-pulseaudio/bava  dist/bava-linux-x86_64-pulseaudio
          mv dist/bava-windows-x86_64/bava.exe       dist/bava-windows-x86_64.exe
          mv dist/bava-macos-aarch64/bava            dist/bava-macos-aarch64
          mv dist/bava-macos-x86_64/bava             dist/bava-macos-x86_64
          chmod +x dist/bava-linux-x86_64 dist/bava-linux-x86_64-pulseaudio \
                   dist/bava-macos-aarch64 dist/bava-macos-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bava-linux-x86_64
            dist/bava-linux-x86_64-pulseaudio
            dist/bava-windows-x86_64.exe
            dist/bava-macos-aarch64
            dist/bava-macos-x86_64
