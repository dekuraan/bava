name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ── Linux x86_64 ─────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpulse-dev \
            libpipewire-0.3-dev \
            clang \
            libclang-dev \
            libasound2-dev \
            libfftw3-dev \
            libdbus-1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libvulkan-dev

      # Primary build: default features include the native PipeWire backend
      # (needs libpipewire-0.3-dev + libclang for libspa-sys' bindgen). This
      # binary links libpipewire-0.3.so, so it requires PipeWire at runtime.
      - name: Build release (native PipeWire)
        run: cargo build --release -p bava

      - name: Strip + stage PipeWire binary
        run: strip target/release/bava

      - name: Upload PipeWire artifact
        uses: actions/upload-artifact@v7
        with:
          name: bava-linux-x86_64
          path: target/release/bava

      # Portable build: no libpipewire link, so it runs on pure-PulseAudio hosts
      # (and on PipeWire via pipewire-pulse). Uploaded as a separate artifact.
      - name: Build release (PulseAudio-only)
        run: cargo build --release -p bava --no-default-features

      - name: Strip + stage PulseAudio binary
        run: strip target/release/bava

      - name: Upload PulseAudio artifact
        uses: actions/upload-artifact@v7
        with:
          name: bava-linux-x86_64-pulseaudio
          path: target/release/bava

  # ── Windows x86_64 ────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install fftw3 (Windows)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://fftw.org/pub/fftw/fftw-3.3.5-dll64.zip" -OutFile fftw.zip
          Expand-Archive fftw.zip -DestinationPath fftw_extract
          # Locate the directory holding fftw3.h (handles any zip nesting)
          $fftwDir = (Get-ChildItem fftw_extract -Recurse -Filter "fftw3.h" |
                      Select-Object -First 1).DirectoryName
          # The zip ships .def files but no .lib; generate the MSVC import library.
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
              -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -property installationPath
          $libExe = (Get-ChildItem "$vsPath\VC\Tools\MSVC" -Recurse -Filter lib.exe |
              Where-Object { $_.FullName -match 'Hostx64\\x64' } |
              Select-Object -First 1).FullName
          $defFile = (Get-ChildItem $fftwDir -Filter "*fftw3-3.def" | Select-Object -First 1).FullName
          & $libExe /machine:x64 /def:$defFile /out:"$fftwDir\fftw3.lib"
          echo "LIB=$fftwDir;$env:LIB" >> $env:GITHUB_ENV
          echo "INCLUDE=$fftwDir;$env:INCLUDE" >> $env:GITHUB_ENV

      - name: Build release
        run: cargo build --release -p bava

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bava-windows-x86_64
          path: target\release\bava.exe

  # ── macOS aarch64 (Apple Silicon) ─────────────────────────────────────────
  build-macos-arm:
    name: Build (macOS aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install fftw3
        run: brew install fftw

      - name: Build release
        run: cargo build --release -p bava --target aarch64-apple-darwin

      - name: Strip binary
        run: strip target/aarch64-apple-darwin/release/bava

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bava-macos-aarch64
          path: target/aarch64-apple-darwin/release/bava

  # ── macOS x86_64 (Intel) ──────────────────────────────────────────────────
  # GitHub retired the free Intel `macos-13` runner (jobs sit queued until the
  # 24h timeout), so build the x86_64 binary by *cross-compiling* on the arm64
  # `macos-latest` runner. The only native dep is FFTW; we install an x86_64
  # build of it via an x86_64 Homebrew running under Rosetta, and point
  # pkg-config (used by cavacore-sys' build.rs) at it.
  build-macos-x86:
    name: Build (macOS x86_64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install Rosetta
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install x86_64 FFTW via Rosetta Homebrew
        run: |
          # macos-latest is arm64 and ships only the /opt/homebrew (arm64) brew.
          # Install a separate x86_64 brew under /usr/local (run via Rosetta) so
          # we get an x86_64 libfftw3 to link the cross-compiled binary against.
          if [ ! -x /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" </dev/null
          fi
          arch -x86_64 /usr/local/bin/brew install fftw

      - name: Build release (cross-compile to x86_64)
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: /usr/local/opt/fftw/lib/pkgconfig
        run: cargo build --release -p bava --target x86_64-apple-darwin

      - name: Strip binary
        run: strip target/x86_64-apple-darwin/release/bava

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bava-macos-x86_64
          path: target/x86_64-apple-darwin/release/bava

  # ── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs:
      - build-linux
      - build-windows
      - build-macos-arm
      - build-macos-x86
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      # download-artifact@v4 expands each artifact into its own directory
      # (dist/<name>/<file>), so flatten into a separate out/ dir with the
      # release asset names — moving onto the existing dirs in place fails.
      - name: Stage release artifacts
        run: |
          mkdir -p out
          mv dist/bava-linux-x86_64/bava             out/bava-linux-x86_64
          mv dist/bava-linux-x86_64-pulseaudio/bava  out/bava-linux-x86_64-pulseaudio
          mv dist/bava-windows-x86_64/bava.exe       out/bava-windows-x86_64.exe
          mv dist/bava-macos-aarch64/bava            out/bava-macos-aarch64
          mv dist/bava-macos-x86_64/bava             out/bava-macos-x86_64
          chmod +x out/bava-linux-x86_64 out/bava-linux-x86_64-pulseaudio \
                   out/bava-macos-aarch64 out/bava-macos-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            out/bava-linux-x86_64
            out/bava-linux-x86_64-pulseaudio
            out/bava-windows-x86_64.exe
            out/bava-macos-aarch64
            out/bava-macos-x86_64
