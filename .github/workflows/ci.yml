name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # No incremental cache across fresh checkouts (mtimes always look "changed"),
  # so it only adds overhead + bloats the Swatinem/rust-cache upload.
  CARGO_INCREMENTAL: "0"
  # Line-tables only: keeps panic backtraces useful without paying for full
  # debuginfo on every dep, which is most of a debug build's compile+link time.
  CARGO_PROFILE_DEV_DEBUG: "1"

jobs:
  # ── Linux: typecheck + tests ────────────────────────────────────────────────
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpulse-dev \
            libpipewire-0.3-dev \
            clang \
            libclang-dev \
            libasound2-dev \
            libdbus-1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libvulkan-dev

      # Default features include the native PipeWire backend (needs
      # libpipewire-0.3-dev + libclang for libspa-sys' bindgen). `check` (not
      # `build`) and the dev profile (not `--release`) keep this to a
      # typecheck — real binaries are only built on tagged releases
      # (release.yml) — and share the dev-profile dep cache with the `test`
      # steps below instead of compiling a separate release-profile dep set.
      - name: Check
        run: cargo check -p bava

      # Guard the PulseAudio-only build (no libpipewire link) so the
      # `--no-default-features` path can't silently rot.
      - name: Check (PulseAudio-only, no PipeWire feature)
        run: cargo check -p bava --no-default-features

      - name: Test (cavacore-rs)
        run: cargo test -p cavacore-rs

      - name: Test (bava)
        run: cargo test -p bava --bin bava

  # ── Windows: native typecheck (real windows crate + MSVC toolchain) ────────
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check
        run: cargo check -p bava

  # ── macOS: native typecheck (Core Audio process taps need the Apple SDK) ───
  macos:
    name: macOS (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check
        run: cargo check -p bava --target aarch64-apple-darwin

  # ── Windows cross-check from Linux (fast type-check, no link) ─────────────
  windows-check:
    name: Windows type-check (cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64

      - name: Check Windows target
        run: cargo check --target x86_64-pc-windows-gnu -p bava
