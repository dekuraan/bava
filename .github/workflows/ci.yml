name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Linux: full build + tests ──────────────────────────────────────────────
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpulse-dev \
            libpipewire-0.3-dev \
            clang \
            libclang-dev \
            libasound2-dev \
            libfftw3-dev \
            libdbus-1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libvulkan-dev

      # Default features include the native PipeWire backend (needs
      # libpipewire-0.3-dev + libclang for libspa-sys' bindgen).
      - name: Build
        run: cargo build --release -p bava

      # Guard the PulseAudio-only build (no libpipewire link) so the
      # `--no-default-features` path can't silently rot.
      - name: Check (PulseAudio-only, no PipeWire feature)
        run: cargo check --release -p bava --no-default-features

      - name: Test (cavacore-rs)
        run: cargo test -p cavacore-rs

  # ── Windows: native build (uses the real windows crate + MSVC toolchain) ──
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # fftw3 is vendored/provided by the build.rs; on Windows it falls back to
      # -lfftw3 if available, otherwise the user must supply it. For CI we
      # download a pre-built fftw3 and put it where the linker can find it.
      - name: Install fftw3 (Windows)
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://fftw.org/pub/fftw/fftw-3.3.5-dll64.zip" -OutFile fftw.zip
          Expand-Archive fftw.zip -DestinationPath fftw_extract
          # Locate the directory holding fftw3.h (handles any zip nesting)
          $fftwDir = (Get-ChildItem fftw_extract -Recurse -Filter "fftw3.h" |
                      Select-Object -First 1).DirectoryName
          # The zip ships .def files but no .lib; generate the MSVC import library.
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
              -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
              -property installationPath
          $libExe = (Get-ChildItem "$vsPath\VC\Tools\MSVC" -Recurse -Filter lib.exe |
              Where-Object { $_.FullName -match 'Hostx64\\x64' } |
              Select-Object -First 1).FullName
          $defFile = (Get-ChildItem $fftwDir -Filter "*fftw3-3.def" | Select-Object -First 1).FullName
          & $libExe /machine:x64 /def:$defFile /out:"$fftwDir\fftw3.lib"
          echo "LIB=$fftwDir;$env:LIB" >> $env:GITHUB_ENV
          echo "INCLUDE=$fftwDir;$env:INCLUDE" >> $env:GITHUB_ENV

      - name: Build
        run: cargo build --release -p bava

  # ── macOS: native build (Core Audio process taps need the Apple SDK) ───────
  macos:
    name: macOS (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install fftw3
        run: brew install fftw

      - name: Build
        run: cargo build --release -p bava --target aarch64-apple-darwin

  # ── Windows cross-check from Linux (fast type-check, no link) ─────────────
  windows-check:
    name: Windows type-check (cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64 \
            libfftw3-dev

      - name: Stage fftw3.h for mingw
        run: |
          mkdir -p /tmp/fftwinc
          cp /usr/include/fftw3.h /tmp/fftwinc/

      - name: Check Windows target
        run: >
          CFLAGS_x86_64_pc_windows_gnu=-I/tmp/fftwinc
          cargo check --target x86_64-pc-windows-gnu -p bava
