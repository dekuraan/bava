name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ── Linux: full build + tests ──────────────────────────────────────────────
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpulse-dev \
            libpipewire-0.3-dev \
            clang \
            libclang-dev \
            libasound2-dev \
            libdbus-1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libvulkan-dev

      # Default features include the native PipeWire backend (needs
      # libpipewire-0.3-dev + libclang for libspa-sys' bindgen).
      - name: Build
        run: cargo build --release -p bava

      # Guard the PulseAudio-only build (no libpipewire link) so the
      # `--no-default-features` path can't silently rot.
      - name: Check (PulseAudio-only, no PipeWire feature)
        run: cargo check --release -p bava --no-default-features

      - name: Test (cavacore-rs)
        run: cargo test -p cavacore-rs

  # ── Windows: native build (uses the real windows crate + MSVC toolchain) ──
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p bava

  # ── macOS: native build (Core Audio process taps need the Apple SDK) ───────
  macos:
    name: macOS (aarch64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p bava --target aarch64-apple-darwin

  # ── Windows cross-check from Linux (fast type-check, no link) ─────────────
  windows-check:
    name: Windows type-check (cross)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc-mingw-w64-x86-64

      - name: Check Windows target
        run: cargo check --target x86_64-pc-windows-gnu -p bava
