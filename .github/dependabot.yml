version: 2
updates:
  # Rust crates across the whole Cargo workspace (root manifest resolves all members).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR per week for routine minor/patch bumps instead of one PR per crate.
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used by ci.yml and release.yml.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
