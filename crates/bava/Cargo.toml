[package]
name = "bava"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "A Bevy music visualizer driven by cavacore, MPRIS, and spotifyd"
default-run = "bava"

[dependencies]
cavacore-rs.workspace = true
bevy = "0.18"

# Audio capture (PulseAudio simple API, works through pipewire-pulse).
libpulse-binding = "2"
libpulse-simple-binding = "2"

# Now-playing metadata + album art over MPRIS / D-Bus.
mpris = "2"

# Album-art fetching and decoding.
ureq = "2"
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }

# Lock-free-ish hand-off from the audio/mpris threads to Bevy systems.
crossbeam-channel = "0.5"

# Configuration: CLI args (clap) layered over a TOML config file.
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "1"
dirs = "6"
